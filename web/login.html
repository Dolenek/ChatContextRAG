<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Přihlášení · Chat Context</title>
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body>
    <main class="login-card">
      <div class="brand-mark">C</div>
      <p class="eyebrow">CHAT CONTEXT SERVER</p>
      <h1>Přihlášení</h1>
      <p class="description">Přihlaste se k soukromému konverzačnímu archivu.</p>
      <form id="login-form">
        <label for="username">Uživatel</label>
        <input id="username" name="username" autocomplete="username" value="admin" required />
        <label for="password">Heslo</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button type="submit">Přihlásit se</button>
      </form>
      <p id="login-error" class="error" role="alert"></p>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
